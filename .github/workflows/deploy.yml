name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The encrypted blob (data/questions.js.enc) is shipped to the browser as-is
  # and decrypted client-side after the user enters the passphrase. No build-time
  # decryption, so no QUESTIONS_KEY secret is needed here anymore.
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify encrypted questions are present
        run: |
          if [ ! -f data/questions.js.enc ]; then
            echo "::error::data/questions.js.enc is missing from the repo."
            exit 1
          fi
          echo "Shipping encrypted blob ($(wc -c < data/questions.js.enc) bytes)."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
