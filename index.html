<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agile Tester · Flashcard Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15191E;
  --ink-soft:#4B5159;
  --paper:#F5F5F5;
  --card:#FFFFFF;
  --line:#E1DFD7;
  --line-strong:#C9C6BA;
  --accent:#3B82F6;
  --accent-deep:#1D4ED8;
  --accent-tint:#EAF1FE;
  --good:#22C55E;
  --good-tint:#E9F9EE;
  --good-deep:#15803D;
  --bad:#EF4444;
  --bad-tint:#FDECEC;
  --bad-deep:#B91C1C;
  --amber:#D9A441;
  --amber-tint:#FBF3E1;
  --radius-lg:18px;
  --radius-md:12px;
  --serif:'Lexend', sans-serif;
  --sans:'Lexend', sans-serif;
  --mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box;}
html.dark{
  --ink:#15191E;
  --ink-soft:#4B5159;
  --paper:#000000;
  --card:#FFFFFF;
  --line:#E1DFD7;
  --line-strong:#C9C6BA;
  --accent:#3B82F6;
  --accent-deep:#1D4ED8;
  --accent-tint:#EAF1FE;
  --good:#22C55E;
  --good-tint:#E9F9EE;
  --good-deep:#15803D;
  --bad:#EF4444;
  --bad-tint:#FDECEC;
  --bad-deep:#B91C1C;
  --amber:#D9A441;
  --amber-tint:#FBF3E1;
}
/* Dark mode: page background is black while cards stay white, so text that sits
   directly on the page (not inside a white card) needs a light colour. */
html.dark .brand h1{ color:#F2F3F5; }
html.dark .navmid{ color:#B8BDC4; }
html.dark .exambar-label{ color:#B8BDC4; }
html.dark .review-header-title{ color:#F2F3F5; }
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  min-height:100vh;
  transition:background .3s ease, color .3s ease;
}
.bg-texture{
  position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:radial-gradient(var(--line-strong) 0.6px, transparent 0.6px);
  background-size:22px 22px;
  -webkit-mask-image:linear-gradient(to bottom, black, transparent 70%);
  mask-image:linear-gradient(to bottom, black, transparent 70%);
}
.wrap{
  position:relative; z-index:1;
  max-width:760px;
  margin:0 auto;
  padding:28px 20px 80px;
}

/* ===== Header ===== */
.topbar{
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  margin-bottom:22px;
}
.brand .eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); margin:0 0 4px;
}
.brand h1{
  font-family:var(--serif); font-weight:500; font-size:26px; margin:0; line-height:1.15;
}
.topbtns{display:flex; gap:8px; flex-shrink:0;}
.iconbtn{
  width:38px; height:38px; border-radius:50%;
  border:1px solid var(--line-strong); background:var(--card); color:var(--ink-soft);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:16px; transition:all .15s ease;
}
.iconbtn:hover{ border-color:var(--accent); color:var(--accent); }
.iconbtn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

/* ===== Exam selector ===== */
.exambar{ display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.exambar-label{
  font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink-soft); flex-shrink:0;
}
.examselect{
  flex:1; font-family:var(--sans); font-size:14px; font-weight:500; color:var(--ink);
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius-md);
  padding:9px 12px; cursor:pointer; transition:border-color .15s ease;
}
.examselect:hover, .examselect:focus{ border-color:var(--accent); outline:none; }

/* ===== Progress strip ===== */
.stats{
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  margin-bottom:14px;
}
.stat{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md);
  padding:10px 12px;
}
.stat .num{ font-family:var(--serif); font-size:21px; font-weight:500; line-height:1; }
.stat .lbl{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.07em; margin-top:5px; }
.stat.correct .num{ color:var(--good-deep); }
.stat.incorrect .num{ color:var(--bad-deep); }
.stat.score .num{ color:var(--accent-deep); }

.barwrap{
  height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin-bottom:30px;
  display:flex;
}
.barseg{ height:100%; transition:width .4s ease; }
.barseg.done{ background:var(--ink-soft); opacity:.35; }
.barseg.current{ background:var(--accent); }

/* ===== Card ===== */
.cardzone{ perspective:1400px; margin-bottom:22px; }
.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:30px 28px 26px;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 28px -16px rgba(20,20,15,.18);
  animation:cardIn .38s cubic-bezier(.2,.8,.2,1);
}
html.dark .card{ box-shadow:0 1px 2px rgba(0,0,0,.3), 0 16px 32px -16px rgba(0,0,0,.5); }
@keyframes cardIn{
  from{ opacity:0; transform:translateY(10px) scale(.985); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}
.card-top{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px; padding-bottom:16px; border-bottom:1px dashed var(--line-strong);
}
.qnum{
  font-family:var(--mono); font-size:12px; color:var(--ink-soft); letter-spacing:.04em;
}
.qnum b{ color:var(--ink); font-weight:600; }
.tagrow{ display:flex; gap:6px; align-items:center; }
.tag{
  font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
  padding:3px 8px; border-radius:20px; border:1px solid var(--line-strong); color:var(--ink-soft);
}
.tag.multi{ color:var(--amber); border-color:var(--amber); }
.bookmark-btn{
  background:none; border:none; cursor:pointer; font-size:18px; color:var(--line-strong);
  padding:0 0 0 4px; line-height:1;
}
.bookmark-btn.on{ color:var(--amber); }

.question{
  font-family:var(--serif); font-size:19px; line-height:1.5; font-weight:500;
  margin:0 0 22px; white-space:pre-line;
}

.options{ display:flex; flex-direction:column; gap:10px; }
.opt{
  display:flex; align-items:flex-start; gap:12px;
  border:1px solid var(--line-strong); border-radius:var(--radius-md);
  padding:13px 14px; cursor:pointer; text-align:left;
  background:var(--card); font-family:var(--sans); font-size:14.5px; line-height:1.5; color:var(--ink);
  transition:border-color .15s ease, background .15s ease, transform .1s ease;
}
.opt:hover:not(.locked){ border-color:var(--accent); background:var(--accent-tint); }
.opt:active:not(.locked){ transform:scale(.995); }
.opt .letter{
  flex-shrink:0; width:24px; height:24px; border-radius:50%;
  border:1px solid var(--line-strong); display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11.5px; font-weight:500; color:var(--ink-soft);
  transition:all .15s ease;
}
.opt .otext{ flex:1; padding-top:1px; }
.opt .markicon{ flex-shrink:0; width:20px; text-align:center; font-weight:700; opacity:0; transform:scale(.5); transition:all .2s ease; }
.opt.locked{ cursor:default; }
.opt.correct{ border-color:var(--good); background:var(--good-tint); }
.opt.correct .letter{ background:var(--good); border-color:var(--good); color:#fff; }
.opt.correct .markicon{ opacity:1; transform:scale(1); color:var(--good-deep); }
.opt.incorrect{ border-color:var(--bad); background:var(--bad-tint); }
.opt.incorrect .letter{ background:var(--bad); border-color:var(--bad); color:#fff; }
.opt.incorrect .markicon{ opacity:1; transform:scale(1); color:var(--bad-deep); }
.opt.faded{ opacity:.5; }
.opt.selectedMulti{ border-color:var(--accent); background:var(--accent-tint); }
.opt.selectedMulti .letter{ background:var(--accent); border-color:var(--accent); color:#fff; }
@keyframes shake{
  10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);}
  30%,50%,70%{transform:translateX(-4px);} 40%,60%{transform:translateX(4px);}
}
.opt.shake{ animation:shake .4s; }

.attempt-note{
  font-size:12.5px; color:var(--bad-deep); margin-top:10px; font-style:italic;
  display:none;
}
.attempt-note.show{ display:block; }

.controlsrow{ display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
.btn{
  font-family:var(--sans); font-size:13.5px; font-weight:500; cursor:pointer;
  padding:9px 16px; border-radius:30px; border:1px solid var(--line-strong);
  background:var(--card); color:var(--ink); transition:all .15s ease;
}
.btn:hover{ border-color:var(--accent); color:var(--accent-deep); }
.btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover{ background:var(--accent-deep); color:#fff; }
.btn:disabled{ opacity:.4; cursor:not-allowed; }
.btn:disabled:hover{ border-color:var(--line-strong); color:var(--ink); }

/* ===== Explanation ===== */
.explain{
  margin-top:18px; max-height:0; overflow:hidden;
  transition:max-height .45s cubic-bezier(.2,.8,.2,1), opacity .35s ease, margin .35s ease;
  opacity:0;
}
.explain.open{ max-height:1400px; opacity:1; }
.explain-inner{
  background:var(--accent-tint); border-left:3px solid var(--accent);
  border-radius:0 var(--radius-md) var(--radius-md) 0;
  padding:16px 18px;
}
.explain-title{
  font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent-deep); margin:0 0 10px; display:flex; align-items:center; gap:7px;
}
.explain-block{ font-size:14px; line-height:1.65; margin:0 0 10px; }
.explain-block:last-child{ margin-bottom:0; }
.explain-block b.opt-letter{
  font-family:var(--mono); font-weight:700; margin-right:4px;
}
.explain-block.is-correct{ color:var(--ink); }
.explain-block.is-correct b.opt-letter{ color:var(--good-deep); }
.explain-block.is-wrong b.opt-letter{ color:var(--bad-deep); }
.explain-block.is-wrong{ color:var(--ink-soft); }

/* ===== Nav ===== */
.navrow{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.navbtn{
  display:flex; align-items:center; gap:7px;
  font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer;
  padding:11px 18px; border-radius:30px; border:1px solid var(--line-strong);
  background:var(--card); color:var(--ink); transition:all .15s ease;
}
.navbtn:hover:not(:disabled){ border-color:var(--accent); color:var(--accent-deep); background:var(--accent-tint); }
.navbtn:disabled{ opacity:.35; cursor:not-allowed; }
.navmid{ font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); }
.navmid button{
  background:none; border:none; color:var(--accent); font-family:var(--mono); font-size:12.5px;
  cursor:pointer; text-decoration:underline; padding:0; margin-left:6px;
}

/* ===== Review mode ===== */
.review-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.review-item{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md);
  padding:14px 16px; cursor:pointer; transition:border-color .15s ease;
  display:flex; gap:12px; align-items:flex-start;
}
.review-item:hover{ border-color:var(--accent); }
.review-item .ri-badge{
  flex-shrink:0; width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11px; font-weight:600;
  background:var(--bad-tint); color:var(--bad-deep); border:1px solid var(--bad);
}
.review-item .ri-text{ font-size:13.5px; line-height:1.5; }
.review-item .ri-text .rq{ color:var(--ink-soft); font-family:var(--mono); font-size:11px; display:block; margin-bottom:3px; }
.empty-state{
  text-align:center; padding:50px 20px; color:var(--ink-soft);
}
.empty-state .ti{ font-size:34px; display:block; margin-bottom:12px; color:var(--good); }

/* ===== Timer ===== */
.timer{
  font-family:var(--mono); font-size:12px; color:var(--ink-soft);
  display:flex; align-items:center; gap:5px;
}
.timer.warn{ color:var(--bad-deep); }

.sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

/* ===== Passphrase gate ===== */
.gate{
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:24px; background:var(--paper);
}
.gate-card{
  width:100%; max-width:380px;
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:30px 28px; text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 28px -16px rgba(20,20,15,.18);
}
.gate-card .eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); margin:0 0 6px;
}
.gate-card h2{ font-family:var(--serif); font-weight:500; font-size:22px; margin:0 0 8px; color:var(--ink); }
.gate-sub{ font-size:13.5px; line-height:1.55; color:var(--ink-soft); margin:0 0 20px; }
.gate-card input{
  width:100%; font-family:var(--sans); font-size:15px; color:var(--ink);
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius-md);
  padding:11px 13px; margin-bottom:12px; transition:border-color .15s ease;
}
.gate-card input:focus{ border-color:var(--accent); outline:none; }
.gate-card .btn.primary{ width:100%; padding:11px; font-size:14.5px; }
.gate-err{ font-size:12.5px; color:var(--bad-deep); margin:12px 0 0; min-height:1em; }

@media (max-width:520px){
  .wrap{ padding:18px 14px 70px; }
  .brand h1{ font-size:21px; }
  .stats{ grid-template-columns:repeat(2,1fr); }
  .card{ padding:22px 18px 20px; }
  .question{ font-size:17px; }
  /* Compact circular arrow-only nav buttons on mobile */
  .navbtn span.label{ display:none; }
  .navbtn{
    gap:0; padding:0; width:46px; height:46px;
    justify-content:center; border-radius:50%; flex-shrink:0;
  }
  .navbtn .navarrow{ width:22px; height:22px; }
  .navmid{ text-align:center; }
}
</style>
</head>
<body>
<div class="bg-texture"></div>

<div id="gate" class="gate">
  <form id="gateForm" class="gate-card" autocomplete="off">
    <p class="eyebrow">CTFL-AT · Locked</p>
    <h2>Enter passphrase</h2>
    <p class="gate-sub">This practice set is protected. Enter the passphrase to load the questions.</p>
    <input id="gatePass" type="password" autocomplete="current-password" placeholder="Passphrase" aria-label="Passphrase">
    <button type="submit" id="gateBtn" class="btn primary">Unlock</button>
    <p id="gateErr" class="gate-err" role="alert"></p>
  </form>
</div>

<h1 class="sr-only">ISTQB Agile Tester flashcard quiz with progress tracking, explanations, bookmarks and a review mode for missed questions.</h1>

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <p class="eyebrow" id="examEyebrow">CTFL-AT · Practice Set</p>
      <h1 id="examTitle">Loading exam…</h1>
    </div>
    <div class="topbtns">
      <button class="iconbtn" id="reviewBtn" title="Review missed questions"><i class="ti ti-flag"></i></button>
      <button class="iconbtn" id="darkBtn" title="Toggle dark mode"><i class="ti ti-moon"></i></button>
    </div>
  </div>

  <div class="exambar">
    <label class="exambar-label" for="examSelect">Practice set</label>
    <select id="examSelect" class="examselect" title="Choose practice exam"></select>
  </div>

  <div id="mainArea"></div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">

<script>
// ===== Passphrase gate =====
// The questions ship to the browser as the encrypted blob data/questions.js.enc
// (openssl aes-256-cbc + pbkdf2). They are decrypted here, in the browser, only
// after the user supplies the correct passphrase. Nothing readable appears in
// DevTools without it, and the passphrase is never stored in the code.
// NOTE: crypto.subtle needs a secure context — open via https:// or http://localhost,
// not file://.
(function(){
  "use strict";
  var SESSION_KEY = 'agileTester_pass_v1';
  var gate = document.getElementById('gate');
  var form = document.getElementById('gateForm');
  var input = document.getElementById('gatePass');
  var btn = document.getElementById('gateBtn');
  var errEl = document.getElementById('gateErr');

  // Decrypt an `openssl enc -aes-256-cbc -pbkdf2 -salt` blob.
  // Layout: "Salted__" (8) + salt (8) + ciphertext. Key+IV derived via
  // PBKDF2-HMAC-SHA256, 10000 iterations (openssl defaults).
  async function decryptOpenSSL(buf, password){
    var bytes = new Uint8Array(buf);
    var magic = String.fromCharCode.apply(null, bytes.subarray(0,8));
    if(magic !== 'Salted__') throw new Error('Unexpected data format.');
    var salt = bytes.subarray(8,16);
    var ct = bytes.subarray(16);
    var baseKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
    var bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt:salt, iterations:10000, hash:'SHA-256' }, baseKey, 384);
    var derived = new Uint8Array(bits);
    var key = await crypto.subtle.importKey(
      'raw', derived.subarray(0,32), { name:'AES-CBC' }, false, ['decrypt']);
    var plain = await crypto.subtle.decrypt(
      { name:'AES-CBC', iv:derived.subarray(32,48) }, key, ct);
    return new TextDecoder().decode(plain);
  }

  async function tryUnlock(password){
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Unlocking…';
    try{
      if(!crypto || !crypto.subtle) throw new Error('This browser can’t decrypt here. Open the site over https or localhost.');
      var resp = await fetch('data/questions.js.enc', { cache:'no-store' });
      if(!resp.ok) throw new Error('Could not load question data.');
      var text = await decryptOpenSSL(await resp.arrayBuffer(), password);
      if(text.indexOf('QUIZ_DATA') === -1) throw new Error('bad passphrase');
      var s = document.createElement('script');
      s.text = text;                 // executes synchronously, sets window.QUIZ_DATA
      document.body.appendChild(s);
      if(!window.QUIZ_DATA) throw new Error('bad passphrase');
      try{ sessionStorage.setItem(SESSION_KEY, password); }catch(e){}
      gate.parentNode.removeChild(gate);
      startQuiz();
    }catch(e){
      try{ sessionStorage.removeItem(SESSION_KEY); }catch(_){}
      btn.disabled = false; btn.textContent = 'Unlock';
      errEl.textContent = (e && /https|localhost/.test(e.message)) ? e.message : 'Incorrect passphrase — try again.';
      input.value = ''; input.focus();
    }
  }

  form.addEventListener('submit', function(e){ e.preventDefault(); if(input.value) tryUnlock(input.value); });

  var remembered = null;
  try{ remembered = sessionStorage.getItem(SESSION_KEY); }catch(e){}
  if(remembered){ tryUnlock(remembered); } else { input.focus(); }
})();

function startQuiz(){
  "use strict";

  var raw = window.QUIZ_DATA;
  var EXAMS = raw.exams.slice();
  // Prepend a combined deck containing every question from all exams.
  var _allQ = [];
  EXAMS.forEach(function(ex){ ex.questions.forEach(function(q){ _allQ.push(q); }); });
  EXAMS.unshift({
    title: 'ISTQB Agile Tester (CTFL-AT) (' + _allQ.length + ')',
    questions: _allQ
  });
  var STORAGE_PREFIX = 'agileTesterFlashcards_v4_';
  var GLOBAL_KEY = 'agileTesterFlashcards_global_v3';

  var globalPref = { dark:false, examIndex:0 };
  try{
    var _g = JSON.parse(localStorage.getItem(GLOBAL_KEY) || 'null');
    if(_g){
      globalPref.dark = !!_g.dark;
      if(typeof _g.examIndex === 'number' && _g.examIndex >= 0 && _g.examIndex < EXAMS.length){
        globalPref.examIndex = _g.examIndex;
      }
    }
  }catch(e){}
  function saveGlobal(){
    try{ localStorage.setItem(GLOBAL_KEY, JSON.stringify(globalPref)); }catch(e){}
  }

  var ORIGINAL_QUESTIONS = [];
  var STORAGE_KEY = '';
  var state = {
    order: [],
    current: 0,
    answers: {},
    bookmarks: {},
    reviewMode: false,
    questionStartTime: Date.now()
  };

  function loadState(){
    try{
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if(saved){
        state.answers = saved.answers || {};
        state.bookmarks = saved.bookmarks || {};
        if(saved.order && saved.order.length === ORIGINAL_QUESTIONS.length){
          state.order = saved.order;
        }
        if(typeof saved.current === 'number') state.current = saved.current;
      }
    }catch(e){}
  }
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        answers: state.answers,
        bookmarks: state.bookmarks,
        order: state.order,
        current: state.current
      }));
    }catch(e){}
  }

  function loadExam(idx){
    globalPref.examIndex = idx;
    ORIGINAL_QUESTIONS = EXAMS[idx].questions.slice();
    STORAGE_KEY = STORAGE_PREFIX + idx;
    document.getElementById('examTitle').textContent = EXAMS[idx].title;
    // Questions always load in their original, fixed order (no shuffling).
    state.order = ORIGINAL_QUESTIONS.map(function(q,i){ return i; });
    state.current = 0;
    state.answers = {};
    state.bookmarks = {};
    state.reviewMode = false;
    state.questionStartTime = Date.now();
    loadState();
    saveGlobal();
  }

  loadExam(globalPref.examIndex);
  if(globalPref.dark) document.documentElement.classList.add('dark');

  var mainArea = document.getElementById('mainArea');

  function isMulti(q){ return Array.isArray(q.correct_answer); }
  function correctSet(q){ return isMulti(q) ? q.correct_answer.slice() : [q.correct_answer]; }
  function optionKeys(q){ return Object.keys(q.options); }

  // A question counts as "answered" only once its answer is committed (locked) —
  // not merely because it was viewed. Guards the nav counter and review list
  // against blank state that older builds persisted just from rendering.
  function isAnswered(a){ return !!(a && a.locked); }
  function countAnswered(){
    var n = 0;
    for(var k in state.answers){
      if(state.answers.hasOwnProperty(k) && isAnswered(state.answers[k])) n++;
    }
    return n;
  }

  function formatExplanationText(t){
    var esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc = esc.replace(/"([^"]+)"/g, '&ldquo;$1&rdquo;');
    return esc;
  }

  function renderStats(){
    // Stats summary and progress strip UI removed per user request.
    // State tracking (state.answers, finalCorrect, etc.) is preserved
    // for the review-mode "missed questions" feature.
  }

  function goTo(idx){
    if(idx < 0 || idx >= state.order.length) return;
    state.current = idx;
    state.questionStartTime = Date.now();
    saveState();
    render();
  }

  function buildExplanation(q, selectedKeys){
    var wrap = document.createElement('div');
    wrap.className = 'explain';
    wrap.id = 'explainBox';
    var inner = document.createElement('div');
    inner.className = 'explain-inner';
    var title = document.createElement('p');
    title.className = 'explain-title';
    title.innerHTML = '<i class="ti ti-bulb"></i> Explanation';
    inner.appendChild(title);

    var keysOrder = optionKeys(q);
    var corrSet = correctSet(q);
    keysOrder.forEach(function(k){
      if(!q.explanation[k]) return;
      var isC = corrSet.indexOf(k) !== -1;
      var p = document.createElement('p');
      p.className = 'explain-block ' + (isC ? 'is-correct' : 'is-wrong');
      p.innerHTML = '<b class="opt-letter">' + k + '.</b>' + formatExplanationText(q.explanation[k]);
      inner.appendChild(p);
    });
    wrap.appendChild(inner);
    return wrap;
  }

  function render(){
    if(state.reviewMode){ renderReview(); return; }
    renderStats();

    var qi = state.order[state.current];
    var q = ORIGINAL_QUESTIONS[qi];
    var saved = state.answers[qi];
    var multi = isMulti(q);
    var corrSet = correctSet(q);

    mainArea.innerHTML = '';

    var zone = document.createElement('div');
    zone.className = 'cardzone';
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'flashcard-' + qi;

    // top row
    var top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML =
      '<span class="qnum">Question <b>' + (state.current+1) + '</b> of ' + state.order.length + '</span>';
    var tagrow = document.createElement('div');
    tagrow.className = 'tagrow';
    if(multi){
      var tag = document.createElement('span');
      tag.className = 'tag multi';
      tag.textContent = 'Select ' + corrSet.length;
      tagrow.appendChild(tag);
    }
    var bm = document.createElement('button');
    bm.className = 'bookmark-btn' + (state.bookmarks[qi] ? ' on' : '');
    bm.innerHTML = '<i class="ti ' + (state.bookmarks[qi] ? 'ti-bookmark-filled' : 'ti-bookmark') + '"></i>';
    bm.setAttribute('aria-label','Bookmark this question');
    bm.onclick = function(){
      state.bookmarks[qi] = !state.bookmarks[qi];
      saveState();
      render();
    };
    tagrow.appendChild(bm);
    top.appendChild(tagrow);
    card.appendChild(top);

    var qtext = document.createElement('p');
    qtext.className = 'question';
    qtext.textContent = q.question;
    card.appendChild(qtext);

    var optsWrap = document.createElement('div');
    optsWrap.className = 'options';
    card.appendChild(optsWrap);

    var attemptNote = document.createElement('p');
    attemptNote.className = 'attempt-note';
    card.appendChild(attemptNote);

    var localState = saved ? Object.assign({}, saved) : {
      attempts: 0,
      locked: false,
      finalCorrect: false,
      selectedMulti: [],
      revealed: false
    };

    function persistAndStats(){
      state.answers[qi] = localState;
      saveState();
      renderStats();
    }

    function showExplanation(){
      var old = card.querySelector('#explainBox');
      if(old) old.remove();
      var box = buildExplanation(q, []);
      card.appendChild(box);
      requestAnimationFrame(function(){
        box.classList.add('open');
      });
      var ctl = card.querySelector('.controlsrow');
      if(ctl) ctl.remove();
    }

    function lockSingle(key, opts){
      var isCorrect = corrSet.indexOf(key) !== -1;
      localState.attempts = (localState.attempts||0) + 1;
      opts.forEach(function(o){
        o.classList.add('locked');
        var k = o.getAttribute('data-key');
        if(k === key){
          o.classList.add(isCorrect ? 'correct' : 'incorrect');
        }
      });
      if(isCorrect){
        localState.locked = true;
        localState.finalCorrect = true;
        localState.chosenKey = key;
        persistAndStats();
        showExplanation();
      } else {
        var wrongOpt = null;
        opts.forEach(function(o){ if(o.getAttribute('data-key')===key) wrongOpt = o; });
        if(wrongOpt){
          wrongOpt.classList.add('shake');
          setTimeout(function(){ wrongOpt.classList.remove('shake'); }, 420);
        }
        if(localState.attempts >= 2){
          localState.locked = true;
          localState.finalCorrect = false;
          localState.chosenKey = key;
          opts.forEach(function(o){
            var k = o.getAttribute('data-key');
            if(corrSet.indexOf(k) !== -1){ o.classList.add('correct'); }
          });
          attemptNote.textContent = 'Correct answer revealed above.';
          attemptNote.classList.add('show');
          persistAndStats();
          showExplanation();
        } else {
          opts.forEach(function(o){
            var k = o.getAttribute('data-key');
            if(k === key){
              o.classList.remove('locked');
              o.classList.add('faded');
            }
          });
          attemptNote.textContent = 'Not quite — option ' + key + ' is incorrect. Give it one more try.';
          attemptNote.classList.add('show');
          persistAndStats();
        }
      }
    }

    if(!multi){
      var optEls = [];
      optionKeys(q).forEach(function(k){
        var btn = document.createElement('button');
        btn.className = 'opt';
        btn.setAttribute('data-key', k);
        btn.innerHTML =
          '<span class="letter">' + k + '</span>' +
          '<span class="otext"></span>' +
          '<span class="markicon"><i class="ti"></i></span>';
        btn.querySelector('.otext').textContent = q.options[k];
        optEls.push(btn);
        optsWrap.appendChild(btn);

        if(localState.locked){
          btn.classList.add('locked');
          if(k === localState.chosenKey && !localState.finalCorrect){
            btn.classList.add('incorrect');
          }
          if(corrSet.indexOf(k) !== -1){
            btn.classList.add('correct');
          }
        } else if(localState.attempts >= 1 && k === localState.chosenKey){
          btn.classList.add('faded');
        }

        btn.onclick = function(){
          if(localState.locked) return;
          lockSingle(k, optEls);
        };
      });
      if(localState.locked){
        attemptNote.textContent = localState.finalCorrect ? '' :
          (localState.attempts >= 2 ? 'Correct answer revealed above.' : '');
        if(attemptNote.textContent) attemptNote.classList.add('show');
      }
    } else {
      var selected = localState.selectedMulti || [];
      var optEls2 = [];
      optionKeys(q).forEach(function(k){
        var btn = document.createElement('button');
        btn.className = 'opt';
        btn.setAttribute('data-key', k);
        btn.innerHTML =
          '<span class="letter">' + k + '</span>' +
          '<span class="otext"></span>' +
          '<span class="markicon"><i class="ti"></i></span>';
        btn.querySelector('.otext').textContent = q.options[k];
        optEls2.push(btn);
        optsWrap.appendChild(btn);

        if(localState.locked){
          btn.classList.add('locked');
          var wasSelected = selected.indexOf(k) !== -1;
          var isC = corrSet.indexOf(k) !== -1;
          if(isC){ btn.classList.add('correct'); }
          else if(wasSelected){ btn.classList.add('incorrect'); }
        } else {
          if(selected.indexOf(k) !== -1) btn.classList.add('selectedMulti');
          btn.onclick = function(){
            var i = selected.indexOf(k);
            if(i === -1) selected.push(k); else selected.splice(i,1);
            localState.selectedMulti = selected;
            persistAndStats();
            render();
          };
        }
      });

      var controls = document.createElement('div');
      controls.className = 'controlsrow';
      if(!localState.locked){
        var checkBtn = document.createElement('button');
        checkBtn.className = 'btn primary';
        checkBtn.textContent = 'Check answer';
        checkBtn.disabled = selected.length === 0;
        checkBtn.onclick = function(){
          var setA = selected.slice().sort().join(',');
          var setB = corrSet.slice().sort().join(',');
          var ok = setA === setB;
          localState.locked = true;
          localState.finalCorrect = ok;
          persistAndStats();
          render();
        };
        controls.appendChild(checkBtn);
      }
      card.appendChild(controls);
    }

    if(localState.locked){
      var box2 = buildExplanation(q, []);
      box2.classList.add('open');
      card.appendChild(box2);
    }

    zone.appendChild(card);
    mainArea.appendChild(zone);

    // nav
    var nav = document.createElement('div');
    nav.className = 'navrow';
    var prevBtn = document.createElement('button');
    prevBtn.className = 'navbtn';
    prevBtn.innerHTML = '<svg class="navarrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg><span class="label">Previous</span>';
    prevBtn.disabled = state.current === 0;
    prevBtn.onclick = function(){ goTo(state.current - 1); };

    var mid = document.createElement('div');
    mid.className = 'navmid';
    mid.textContent = countAnswered() + ' / ' + state.order.length + ' answered';

    var nextBtn = document.createElement('button');
    nextBtn.className = 'navbtn';
    nextBtn.innerHTML = '<span class="label">Next</span><svg class="navarrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>';
    nextBtn.disabled = state.current >= state.order.length - 1;
    nextBtn.onclick = function(){ goTo(state.current + 1); };

    nav.appendChild(prevBtn);
    nav.appendChild(mid);
    nav.appendChild(nextBtn);
    mainArea.appendChild(nav);

    // Persist navigation position only. Do NOT write an answer entry here —
    // that would mark a merely-viewed question as answered.
    saveState();
  }

  function renderReview(){
    renderStats();
    mainArea.innerHTML = '';
    var header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;';
    header.innerHTML = '<p class="review-header-title" style="font-family:var(--serif);font-size:18px;font-weight:500;margin:0;">Review · missed questions</p>';
    var backBtn = document.createElement('button');
    backBtn.className = 'btn';
    backBtn.textContent = 'Back to deck';
    backBtn.onclick = function(){ state.reviewMode = false; render(); };
    header.appendChild(backBtn);
    mainArea.appendChild(header);

    var missedIdx = [];
    state.order.forEach(function(qi, idx){
      var a = state.answers[qi];
      if(isAnswered(a) && !a.finalCorrect) missedIdx.push(idx);
    });

    if(missedIdx.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<i class="ti ti-circle-check"></i>No missed questions yet — keep going, or come back here after a full pass.';
      mainArea.appendChild(empty);
      return;
    }

    var list = document.createElement('div');
    list.className = 'review-list';
    missedIdx.forEach(function(idx){
      var qi = state.order[idx];
      var q = ORIGINAL_QUESTIONS[qi];
      var item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML =
        '<span class="ri-badge">Q' + (idx+1) + '</span>' +
        '<span class="ri-text"><span class="rq">Tap to revisit</span>' + q.question.slice(0,140) + (q.question.length>140?'…':'') + '</span>';
      item.onclick = function(){
        state.reviewMode = false;
        goTo(idx);
      };
      list.appendChild(item);
    });
    mainArea.appendChild(list);
  }

  document.getElementById('reviewBtn').onclick = function(){
    state.reviewMode = !state.reviewMode;
    document.getElementById('reviewBtn').classList.toggle('active', state.reviewMode);
    render();
  };
  document.getElementById('darkBtn').onclick = function(){
    globalPref.dark = !globalPref.dark;
    document.documentElement.classList.toggle('dark', globalPref.dark);
    document.getElementById('darkBtn').classList.toggle('active', globalPref.dark);
    saveGlobal();
  };
  if(globalPref.dark) document.getElementById('darkBtn').classList.add('active');

  var examSelect = document.getElementById('examSelect');
  EXAMS.forEach(function(ex, i){
    var o = document.createElement('option');
    o.value = i;
    o.textContent = ex.title.replace('ISTQB Agile Tester (CTFL-AT) ', '');
    examSelect.appendChild(o);
  });
  examSelect.value = globalPref.examIndex;
  examSelect.onchange = function(){
    loadExam(parseInt(this.value, 10));
    document.getElementById('reviewBtn').classList.remove('active');
    render();
  };

  render();
}
</script>
</body>
</html>
