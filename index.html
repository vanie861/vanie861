<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agile Tester · Flashcard Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15191E;
  --ink-soft:#4B5159;
  --paper:#F5F5F5;
  --card:#FFFFFF;
  --line:#E1DFD7;
  --line-strong:#C9C6BA;
  --accent:#3B82F6;
  --accent-deep:#1D4ED8;
  --accent-tint:#EAF1FE;
  --good:#22C55E;
  --good-tint:#E9F9EE;
  --good-deep:#15803D;
  --bad:#EF4444;
  --bad-tint:#FDECEC;
  --bad-deep:#B91C1C;
  --amber:#D9A441;
  --amber-tint:#FBF3E1;
  --radius-lg:18px;
  --radius-md:12px;
  --serif:'Lexend', sans-serif;
  --sans:'Lexend', sans-serif;
  --mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box;}
html.dark{
  --ink:#15191E;
  --ink-soft:#4B5159;
  --paper:#000000;
  --card:#FFFFFF;
  --line:#E1DFD7;
  --line-strong:#C9C6BA;
  --accent:#3B82F6;
  --accent-deep:#1D4ED8;
  --accent-tint:#EAF1FE;
  --good:#22C55E;
  --good-tint:#E9F9EE;
  --good-deep:#15803D;
  --bad:#EF4444;
  --bad-tint:#FDECEC;
  --bad-deep:#B91C1C;
  --amber:#D9A441;
  --amber-tint:#FBF3E1;
}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  min-height:100vh;
  transition:background .3s ease, color .3s ease;
}
.bg-texture{
  position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:radial-gradient(var(--line-strong) 0.6px, transparent 0.6px);
  background-size:22px 22px;
  -webkit-mask-image:linear-gradient(to bottom, black, transparent 70%);
  mask-image:linear-gradient(to bottom, black, transparent 70%);
}
.wrap{
  position:relative; z-index:1;
  max-width:760px;
  margin:0 auto;
  padding:28px 20px 80px;
}

/* ===== Header ===== */
.topbar{
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  margin-bottom:22px;
}
.brand .eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); margin:0 0 4px;
}
.brand h1{
  font-family:var(--serif); font-weight:500; font-size:26px; margin:0; line-height:1.15;
}
.topbtns{display:flex; gap:8px; flex-shrink:0;}
.iconbtn{
  width:38px; height:38px; border-radius:50%;
  border:1px solid var(--line-strong); background:var(--card); color:var(--ink-soft);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:16px; transition:all .15s ease;
}
.iconbtn:hover{ border-color:var(--accent); color:var(--accent); }
.iconbtn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

/* ===== Progress strip ===== */
.stats{
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  margin-bottom:14px;
}
.stat{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md);
  padding:10px 12px;
}
.stat .num{ font-family:var(--serif); font-size:21px; font-weight:500; line-height:1; }
.stat .lbl{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.07em; margin-top:5px; }
.stat.correct .num{ color:var(--good-deep); }
.stat.incorrect .num{ color:var(--bad-deep); }
.stat.score .num{ color:var(--accent-deep); }

.barwrap{
  height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin-bottom:30px;
  display:flex;
}
.barseg{ height:100%; transition:width .4s ease; }
.barseg.done{ background:var(--ink-soft); opacity:.35; }
.barseg.current{ background:var(--accent); }

/* ===== Card ===== */
.cardzone{ perspective:1400px; margin-bottom:22px; }
.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:30px 28px 26px;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 28px -16px rgba(20,20,15,.18);
  animation:cardIn .38s cubic-bezier(.2,.8,.2,1);
}
html.dark .card{ box-shadow:0 1px 2px rgba(0,0,0,.3), 0 16px 32px -16px rgba(0,0,0,.5); }
@keyframes cardIn{
  from{ opacity:0; transform:translateY(10px) scale(.985); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}
.card-top{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px; padding-bottom:16px; border-bottom:1px dashed var(--line-strong);
}
.qnum{
  font-family:var(--mono); font-size:12px; color:var(--ink-soft); letter-spacing:.04em;
}
.qnum b{ color:var(--ink); font-weight:600; }
.tagrow{ display:flex; gap:6px; align-items:center; }
.tag{
  font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
  padding:3px 8px; border-radius:20px; border:1px solid var(--line-strong); color:var(--ink-soft);
}
.tag.multi{ color:var(--amber); border-color:var(--amber); }
.bookmark-btn{
  background:none; border:none; cursor:pointer; font-size:18px; color:var(--line-strong);
  padding:0 0 0 4px; line-height:1;
}
.bookmark-btn.on{ color:var(--amber); }

.question{
  font-family:var(--serif); font-size:19px; line-height:1.5; font-weight:500;
  margin:0 0 22px; white-space:pre-line;
}

.options{ display:flex; flex-direction:column; gap:10px; }
.opt{
  display:flex; align-items:flex-start; gap:12px;
  border:1px solid var(--line-strong); border-radius:var(--radius-md);
  padding:13px 14px; cursor:pointer; text-align:left;
  background:var(--card); font-family:var(--sans); font-size:14.5px; line-height:1.5; color:var(--ink);
  transition:border-color .15s ease, background .15s ease, transform .1s ease;
}
.opt:hover:not(.locked){ border-color:var(--accent); background:var(--accent-tint); }
.opt:active:not(.locked){ transform:scale(.995); }
.opt .letter{
  flex-shrink:0; width:24px; height:24px; border-radius:50%;
  border:1px solid var(--line-strong); display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11.5px; font-weight:500; color:var(--ink-soft);
  transition:all .15s ease;
}
.opt .otext{ flex:1; padding-top:1px; }
.opt .markicon{ flex-shrink:0; width:20px; text-align:center; font-weight:700; opacity:0; transform:scale(.5); transition:all .2s ease; }
.opt.locked{ cursor:default; }
.opt.correct{ border-color:var(--good); background:var(--good-tint); }
.opt.correct .letter{ background:var(--good); border-color:var(--good); color:#fff; }
.opt.correct .markicon{ opacity:1; transform:scale(1); color:var(--good-deep); }
.opt.incorrect{ border-color:var(--bad); background:var(--bad-tint); }
.opt.incorrect .letter{ background:var(--bad); border-color:var(--bad); color:#fff; }
.opt.incorrect .markicon{ opacity:1; transform:scale(1); color:var(--bad-deep); }
.opt.faded{ opacity:.5; }
.opt.selectedMulti{ border-color:var(--accent); background:var(--accent-tint); }
.opt.selectedMulti .letter{ background:var(--accent); border-color:var(--accent); color:#fff; }
@keyframes shake{
  10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);}
  30%,50%,70%{transform:translateX(-4px);} 40%,60%{transform:translateX(4px);}
}
.opt.shake{ animation:shake .4s; }

.attempt-note{
  font-size:12.5px; color:var(--bad-deep); margin-top:10px; font-style:italic;
  display:none;
}
.attempt-note.show{ display:block; }

.controlsrow{ display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
.btn{
  font-family:var(--sans); font-size:13.5px; font-weight:500; cursor:pointer;
  padding:9px 16px; border-radius:30px; border:1px solid var(--line-strong);
  background:var(--card); color:var(--ink); transition:all .15s ease;
}
.btn:hover{ border-color:var(--accent); color:var(--accent-deep); }
.btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover{ background:var(--accent-deep); color:#fff; }
.btn:disabled{ opacity:.4; cursor:not-allowed; }
.btn:disabled:hover{ border-color:var(--line-strong); color:var(--ink); }

/* ===== Explanation ===== */
.explain{
  margin-top:18px; max-height:0; overflow:hidden;
  transition:max-height .45s cubic-bezier(.2,.8,.2,1), opacity .35s ease, margin .35s ease;
  opacity:0;
}
.explain.open{ max-height:1400px; opacity:1; }
.explain-inner{
  background:var(--accent-tint); border-left:3px solid var(--accent);
  border-radius:0 var(--radius-md) var(--radius-md) 0;
  padding:16px 18px;
}
.explain-title{
  font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent-deep); margin:0 0 10px; display:flex; align-items:center; gap:7px;
}
.explain-block{ font-size:14px; line-height:1.65; margin:0 0 10px; }
.explain-block:last-child{ margin-bottom:0; }
.explain-block b.opt-letter{
  font-family:var(--mono); font-weight:700; margin-right:4px;
}
.explain-block.is-correct{ color:var(--ink); }
.explain-block.is-correct b.opt-letter{ color:var(--good-deep); }
.explain-block.is-wrong b.opt-letter{ color:var(--bad-deep); }
.explain-block.is-wrong{ color:var(--ink-soft); }

/* ===== Nav ===== */
.navrow{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.navbtn{
  display:flex; align-items:center; gap:7px;
  font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer;
  padding:11px 18px; border-radius:30px; border:1px solid var(--line-strong);
  background:var(--card); color:var(--ink); transition:all .15s ease;
}
.navbtn:hover:not(:disabled){ border-color:var(--accent); color:var(--accent-deep); background:var(--accent-tint); }
.navbtn:disabled{ opacity:.35; cursor:not-allowed; }
.navmid{ font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); }
.navmid button{
  background:none; border:none; color:var(--accent); font-family:var(--mono); font-size:12.5px;
  cursor:pointer; text-decoration:underline; padding:0; margin-left:6px;
}

/* ===== Review mode ===== */
.review-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.review-item{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md);
  padding:14px 16px; cursor:pointer; transition:border-color .15s ease;
  display:flex; gap:12px; align-items:flex-start;
}
.review-item:hover{ border-color:var(--accent); }
.review-item .ri-badge{
  flex-shrink:0; width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11px; font-weight:600;
  background:var(--bad-tint); color:var(--bad-deep); border:1px solid var(--bad);
}
.review-item .ri-text{ font-size:13.5px; line-height:1.5; }
.review-item .ri-text .rq{ color:var(--ink-soft); font-family:var(--mono); font-size:11px; display:block; margin-bottom:3px; }
.empty-state{
  text-align:center; padding:50px 20px; color:var(--ink-soft);
}
.empty-state .ti{ font-size:34px; display:block; margin-bottom:12px; color:var(--good); }

/* ===== Timer ===== */
.timer{
  font-family:var(--mono); font-size:12px; color:var(--ink-soft);
  display:flex; align-items:center; gap:5px;
}
.timer.warn{ color:var(--bad-deep); }

.sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

@media (max-width:520px){
  .wrap{ padding:18px 14px 70px; }
  .brand h1{ font-size:21px; }
  .stats{ grid-template-columns:repeat(2,1fr); }
  .card{ padding:22px 18px 20px; }
  .question{ font-size:17px; }
  .navbtn span.label{ display:none; }
}
</style>
</head>
<body>
<div class="bg-texture"></div>
<h1 class="sr-only">ISTQB Agile Tester flashcard quiz with progress tracking, explanations, bookmarks and a review mode for missed questions.</h1>

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <p class="eyebrow" id="examEyebrow">CTFL-AT · Practice Set</p>
      <h1 id="examTitle">Loading exam…</h1>
    </div>
    <div class="topbtns">
      <button class="iconbtn" id="shuffleBtn" title="Shuffle questions"><i class="ti ti-arrows-shuffle"></i></button>
      <button class="iconbtn" id="reviewBtn" title="Review missed questions"><i class="ti ti-flag"></i></button>
      <button class="iconbtn" id="darkBtn" title="Toggle dark mode"><i class="ti ti-moon"></i></button>
    </div>
  </div>

  <div id="mainArea"></div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script id="quiz-data" type="application/json">
{
  "title": "ISTQB Agile Tester (CTFL-AT) Full Practice Exam 1",
  "questions": [
    {
      "number": 1,
      "question": "Which of the following BEST describes the purpose of task management and tracking tools used by Agile testers?",
      "options": {
        "A": "To generate test metrics reports and aggregate defect trends across multiple releases",
        "B": "To create, assign, and monitor testing tasks and their progress throughout the sprint",
        "C": "To execute automated regression tests and report pass or fail results to the team",
        "D": "To version control source code and test scripts across multiple branches and iterations"
      },
      "correct_answer": "B",
      "explanation": {
        "A": "Test metrics aggregation and defect trend reporting across releases are functions of test management or reporting tools, not task management tools. Task management tools track individual task status within a sprint, not cross-release quality trend analysis. This option describes a reporting tool capability, not task management.",
        "B": "Task management and tracking tools in Agile projects enable testers to create testing tasks, assign them to team members, and monitor their completion status throughout the sprint, supporting visibility and coordination of test activities, as per reference section 3.4.1. These tools provide the operational transparency needed to track testing work alongside development tasks. The other options describe unrelated tool categories.",
        "C": "Automated test execution and results reporting are functions of test automation frameworks and continuous integration tools, not task management tools. Task management tools track work item status and assignment, not test execution outcomes. This option conflates two distinct Agile tool categories.",
        "D": "Version control and branch management are functions of configuration management tools, not task management tools. Task management tools focus on work item tracking and sprint coordination, not on source code or artefact versioning. This option misattributes a configuration management function to a task tracking category."
      }
    },
    {
      "number": 2,
      "question": "You are reviewing your team's test suite before the start of a new sprint. Several automated test cases cover features that were replaced or significantly modified three iterations ago. A colleague argues that all test cases should be kept permanently since they represent historical coverage. Which action BEST describes how test cases should evolve across multiple iterations in an Agile project?",
      "options": {
        "A": "All existing test cases should be deleted at the start of each sprint and recreated to reflect the current sprint content exclusively",
        "B": "Test cases should only be modified when a defect is reported that the existing suite failed to detect",
        "C": "Test cases should be reviewed each iteration and updated or retired when the features they cover have changed or been removed",
        "D": "All test cases must be retained permanently regardless of product changes to preserve complete historical regression coverage"
      },
      "correct_answer": "C",
      "explanation": {
        "A": "Deleting all test cases each sprint destroys accumulated regression coverage for stable, previously validated features. Regression testing depends on retaining tests for unchanged or stable functionality to detect unintended changes introduced by new development. Wholesale deletion removes the regression protection that the suite provides across iterations.",
        "B": "Reactive test case modification triggered only by defect escapes is a lagging, post-failure approach to test maintenance. Proactive review and update of test cases during iteration planning ensures the suite remains accurate and comprehensive before defects are introduced. This option defers test case maintenance until after quality has already been compromised.",
        "C": "Evolving tests across multiple iterations requires regular review to ensure test cases remain aligned with the current product state, and cases covering removed or significantly changed features must be updated or retired to prevent misleading results and unnecessary maintenance overhead, as per reference section 2.2.2. Permanent retention of outdated tests inflates the suite and reduces its reliability as a quality indicator. The other options apply blanket retention or replacement policies inconsistent with sound test management.",
        "D": "Retaining test cases for features that no longer exist or have been fundamentally changed produces misleading pass or fail results and increases suite maintenance burden without quality benefit. Historical coverage value must be balanced against current product accuracy. Permanent retention prioritises artefact preservation over test effectiveness."
      }
    },
    {
      "number": 3,
      "question": "You are a tester on an Agile team that is part of a larger organisation considering how to structure its testing capability. Your manager asks you to explain the organisational options for independent testing in Agile projects. Which option BEST describes a valid organisational approach for independent testing in an Agile context?",
      "options": {
        "A": "Testers must be permanently assigned to independent test teams and never embedded within Agile development teams",
        "B": "A separate independent test team can be engaged for system-level or release-level testing while the embedded tester handles iteration-level testing within the team",
        "C": "All testing in Agile projects must be performed by developers to maximise integration and eliminate the need for separate testers",
        "D": "Independent testing must be avoided in Agile projects because it contradicts the whole-team quality ownership principle"
      },
      "correct_answer": "B",
      "explanation": {
        "A": "The CTFL-AT syllabus describes embedding testers within Agile teams as a primary organisational model for iteration-level testing. Prohibiting embedded testers removes the early, collaborative testing engagement that is fundamental to Agile quality practices. This option describes a strictly sequential test organisation incompatible with Agile integration principles.",
        "B": "The CTFL-AT syllabus recognises that independent testing in Agile can be structured so that an external test team provides objectivity at higher test levels such as system or release testing, while the embedded tester manages iteration-level activities, as per reference section 2.1.3. This approach balances independence with Agile integration. The other options either eliminate embedded testers or prohibit independent testing without syllabus justification.",
        "C": "The CTFL-AT syllabus defines a specific tester role within Agile teams and does not advocate developer-only testing. While developers perform unit testing, the tester role contributes distinct skills including independence, domain knowledge, and test technique application. Eliminating dedicated testers would reduce test coverage breadth and objectivity.",
        "D": "Independent testing is a recognised and valid option in Agile, particularly for higher test levels requiring objectivity that embedded team members may not provide. The whole-team quality principle does not prohibit independent testing; it defines the default team quality responsibility. This option applies an absolute prohibition not supported by the syllabus."
      }
    },
    {
      "number": 4,
      "question": "You are a tester who has been embedded in the same Agile development team for eighteen months. Your organisation is reviewing its testing structure and identifies two risks associated with your long-term assignment to a single team. Which TWO of the following represent recognised risks for embedded testers assigned long-term to a single Agile team? (Select TWO)",
      "options": {
        "A": "The tester may become too comfortable with team norms and reduce the rigour of defect reporting to maintain team relationships",
        "B": "The tester may adopt the team's assumptions and lose the critical perspective needed to identify defects objectively",
        "C": "The tester will accumulate too much domain knowledge and become unable to test new features introduced in the product",
        "D": "The tester will inevitably automate all manual tests, creating a technical imbalance in the team's skill distribution"
      },
      "correct_answer": ["A", "B"],
      "explanation": {
        "A": "Prolonged team membership can create social pressure that discourages thorough defect reporting, as testers may soften assessments to preserve interpersonal relationships, as per reference section 2.1.3. This risk directly threatens the objectivity that effective testing requires. It is a recognised consequence of extended team embedding without structural independence safeguards.",
        "B": "Long-term assignment to a single team creates alignment risk where the tester gradually adopts the team's shared assumptions and blind spots, reducing their ability to evaluate the product with impartiality, as per reference section 2.1.3. This erosion of critical perspective is a documented organisational risk associated with embedded tester independence. Mitigation strategies include periodic rotation or supplemental independent review.",
        "C": "Domain knowledge accumulation improves testing effectiveness and is not identified as a risk in the CTFL-AT syllabus. Deep domain familiarity enables testers to design more targeted and meaningful tests. This option inverts the actual value of domain expertise by presenting it as an impediment.",
        "D": "Progressive automation by an experienced tester is a positive contribution, not a documented independence risk associated with long-term assignment. The syllabus does not identify automation skill development as an organisational risk for embedded testers. This option describes a beneficial outcome that is mischaracterised as a structural concern."
      }
    },
    {
      "number": 5,
      "question": "You are a tester writing ATDD test cases for a user story covering a hotel room booking feature. The story states: \"As a guest, I want to reserve a room for specific dates so that I am guaranteed accommodation during my stay.\" The acceptance criteria state that a guest cannot book a room that is already reserved for the requested dates. Using the given/when/then format, which test case BEST addresses the acceptance criterion for this story?",
      "options": {
        "A": "Given a room is already reserved for the requested dates, when a guest attempts to book that room for the same dates, then the system displays an availability error and prevents the booking",
        "B": "Given a guest has valid login credentials, when the guest navigates to the booking page, then the booking form is displayed correctly",
        "C": "Given no rooms are available in the hotel, when a guest attempts any booking, then the system displays a general unavailability message",
        "D": "Given a guest selects a room, when the booking is confirmed, then a confirmation email is sent to the guest's registered address"
      },
      "correct_answer": "A",
      "explanation": {
        "A": "This given/when/then test case directly tests the stated acceptance criterion by establishing the precondition of an existing reservation, triggering the booking attempt, and asserting the expected system response of an error message and booking prevention, as per reference section 3.3.3. The test case is specific, executable, and unambiguously derived from the acceptance criterion. The other options either test unrelated conditions or omit the critical precondition.",
        "B": "This test case tests navigation and form display behaviour, not the acceptance criterion about preventing double bookings. The stated criterion requires testing the conflict detection logic, not the user interface presentation for authenticated users. This option tests an adjacent functional behaviour unrelated to the specific criterion being verified.",
        "C": "The acceptance criterion specifies a condition where a particular room is reserved for the requested dates, not a scenario where all rooms are unavailable. Generalising the precondition changes the test scenario and may not exercise the targeted reservation conflict detection logic. This option tests a broader scenario that does not directly address the specific acceptance criterion.",
        "D": "This test case tests the confirmation notification behaviour after a successful booking, not the conflict prevention acceptance criterion. The criterion under test requires validating that an already-reserved room cannot be re-booked, which this test case does not address. This option tests a post-booking workflow step unrelated to the stated acceptance condition."
      }
    },
    {
      "number": 6,
      "question": "Which of the following BEST describes the process steps followed in test-driven development?",
      "options": {
        "A": "Write a failing test, implement the minimum code to pass the test, then refactor the code while keeping the test passing",
        "B": "Implement the full feature, write tests to validate it, then review the code with the product owner before committing",
        "C": "Define acceptance criteria, develop the feature to meet them, then conduct a manual review session before testing",
        "D": "Create a test plan, assign test cases to developers, and execute them after each sprint review"
      },
      "correct_answer": "A",
      "explanation": {
        "A": "Test-driven development follows the red-green-refactor cycle: first write a failing test that defines desired behaviour, then write the minimum production code to make the test pass, and finally refactor the code to improve quality while maintaining test passage, as per reference section 3.1.1. This sequence is the defining characteristic of TDD as a development practice. The other options either reverse steps or describe alternative practices.",

        "A": "Physical proximity does not automatically ensure equal contribution; team norms, facilitation, and role clarity are additional factors that influence collaborative balance. Co-location facilitates communication but does not govern contribution levels across roles. This option incorrectly attributes a behavioural guarantee to a physical arrangement.",
        "B": "The product owner's participation in sprint planning is a Scrum requirement that co-location does not override. The product owner is responsible for backlog prioritisation and story selection input regardless of team proximity. This option misrepresents the product owner's role in the planning ceremony.",
        "C": "Co-location supports the whole-team approach by enabling spontaneous, synchronous communication among all team members, which reduces the latency and misinterpretation risk associated with distributed working, as per reference section 1.1.2. Proximity allows testers and developers to resolve ambiguities and defects without scheduling delays. The other options either overstate co-location benefits or misattribute outcomes unrelated to the collaboration model.",
        "D": "Sprint ceremonies serve structured purposes, including planning, review, and retrospective, that informal co-located communication cannot replace. Co-location enhances the effectiveness of these events but does not substitute for them. Eliminating ceremonies would remove the structured cadence that Agile frameworks require for team alignment."
      }
    },
    {
      "number": 39,
      "question": "You are a tester on an Agile team that uses a burndown chart to track sprint progress. At the midpoint of the sprint, the burndown chart shows that the remaining work is significantly above the ideal trend line. Which action BEST represents using the burndown chart as a test status communication tool in this situation?",
      "options": {
        "A": "Raise the deviation as a testing impediment during the daily standup and propose adjusting scope or effort to align with the sprint goal",
        "B": "Wait until the end of the sprint to review the burndown chart before deciding whether to report the deviation",
        "C": "Update the burndown chart to reflect the ideal trend line by adjusting the baseline so the deviation is no longer visible",
        "D": "Escalate the burndown deviation directly to the product owner and request that additional team members be added to the sprint"
      },
      "correct_answer": "A",
      "explanation": {
        "A": "Burndown charts are used to communicate testing progress and product quality status, and a significant deviation from the ideal trend line at sprint midpoint should be raised as an impediment in the daily standup to enable team-level response, as per reference section 2.2.1. This action uses the chart as an active communication tool rather than a passive observation. The other options either defer action or misuse the burndown data.",
        "B": "Waiting until sprint end to act on a midpoint deviation removes the opportunity for the team to adjust effort or scope in time to meet the sprint goal. Burndown charts are designed to provide real-time visibility that enables proactive response, not retrospective reporting. Deferring action on a visible negative trend undermines the communication purpose of the tool.",
        "C": "Manipulating the baseline to eliminate visible deviation falsifies the team's progress status and removes the transparency that burndown charts are designed to provide. Accurate burndown data enables honest stakeholder communication and informed team decision-making. Altering the baseline to hide deviation is a quality reporting integrity failure.",
        "D": "Escalating directly to the product owner and requesting resource additions bypasses the team's own problem-solving responsibility and daily standup communication mechanism. The first response to a burndown deviation is a team-level discussion to assess root cause and identify corrective options before escalation. Resource additions are a structural decision that requires broader consensus, not an immediate response to a midpoint trend deviation."
      }
    },
    {
      "number": 40,
      "question": "Which of the following BEST defines a test charter in the context of Agile exploratory testing?",
      "options": {
        "A": "A comprehensive list of step-by-step test procedures to be followed during a scripted test session",
        "B": "A report summarising the defects found and coverage achieved during a completed testing session",
        "C": "A documented statement of the scope and mission that guides an exploratory testing session",
        "D": "A formal test plan approved by the project manager before exploratory testing can begin"
      },
      "correct_answer": "C",
      "explanation": {
        "A": "A test charter is specifically designed for exploratory testing, where tester judgement and adaptive investigation replace scripted step-by-step procedures. Detailed procedural scripts define scripted testing, not exploratory sessions. This option misidentifies the charter as a scripted test procedure, which contradicts its purpose.",
        "B": "A test charter is a pre-session planning artefact that guides exploration, not a post-session reporting document. The session sheet or debrief note captures findings and coverage after the session completes. This option confuses a planning input with a reporting output.",
        "C": "A test charter is defined as a statement of the scope, objectives, and mission that provides direction for an exploratory testing session without over-constraining the tester's investigation, as per reference section 3. This definition distinguishes the charter as a guiding artefact rather than a scripted test procedure. The other options describe unrelated test artefacts or misattribute the purpose of the charter.",
        "D": "A test charter is a lightweight, tester-defined guiding statement, not a formally approved management document. Exploratory testing charters are created to direct individual sessions, not to satisfy project governance approval requirements. This option conflates a test charter with a formal test plan artefact."
      }
    }
  ]
}

</script>

<script>
(function(){
  "use strict";

  var raw = JSON.parse(document.getElementById('quiz-data').textContent);
  var ORIGINAL_QUESTIONS = raw.questions.slice();
  document.getElementById('examTitle').textContent = raw.title;

  var STORAGE_KEY = 'agileTesterFlashcards_v1';
  var state = {
    order: ORIGINAL_QUESTIONS.map(function(q,i){ return i; }),
    current: 0,
    answers: {},
    bookmarks: {},
    dark: false,
    reviewMode: false,
    questionStartTime: Date.now()
  };

  function loadState(){
    try{
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if(saved){
        state.answers = saved.answers || {};
        state.bookmarks = saved.bookmarks || {};
        state.dark = !!saved.dark;
        if(saved.order && saved.order.length === ORIGINAL_QUESTIONS.length){
          state.order = saved.order;
        }
        if(typeof saved.current === 'number') state.current = saved.current;
      }
    }catch(e){}
  }
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        answers: state.answers,
        bookmarks: state.bookmarks,
        dark: state.dark,
        order: state.order,
        current: state.current
      }));
    }catch(e){}
  }

  loadState();
  if(state.dark) document.documentElement.classList.add('dark');

  var mainArea = document.getElementById('mainArea');

  function isMulti(q){ return Array.isArray(q.correct_answer); }
  function correctSet(q){ return isMulti(q) ? q.correct_answer.slice() : [q.correct_answer]; }
  function optionKeys(q){ return Object.keys(q.options); }

  function formatExplanationText(t){
    var esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc = esc.replace(/"([^"]+)"/g, '&ldquo;$1&rdquo;');
    return esc;
  }

  function renderStats(){
    // Stats summary and progress strip UI removed per user request.
    // State tracking (state.answers, finalCorrect, etc.) is preserved
    // for the review-mode "missed questions" feature.
  }

  function goTo(idx){
    if(idx < 0 || idx >= state.order.length) return;
    state.current = idx;
    state.questionStartTime = Date.now();
    saveState();
    render();
  }

  function buildExplanation(q, selectedKeys){
    var wrap = document.createElement('div');
    wrap.className = 'explain';
    wrap.id = 'explainBox';
    var inner = document.createElement('div');
    inner.className = 'explain-inner';
    var title = document.createElement('p');
    title.className = 'explain-title';
    title.innerHTML = '<i class="ti ti-bulb"></i> Explanation';
    inner.appendChild(title);

    var keysOrder = optionKeys(q);
    var corrSet = correctSet(q);
    keysOrder.forEach(function(k){
      if(!q.explanation[k]) return;
      var isC = corrSet.indexOf(k) !== -1;
      var p = document.createElement('p');
      p.className = 'explain-block ' + (isC ? 'is-correct' : 'is-wrong');
      p.innerHTML = '<b class="opt-letter">' + k + '.</b>' + formatExplanationText(q.explanation[k]);
      inner.appendChild(p);
    });
    wrap.appendChild(inner);
    return wrap;
  }

  function render(){
    if(state.reviewMode){ renderReview(); return; }
    renderStats();

    var qi = state.order[state.current];
    var q = ORIGINAL_QUESTIONS[qi];
    var saved = state.answers[qi];
    var multi = isMulti(q);
    var corrSet = correctSet(q);

    mainArea.innerHTML = '';

    var zone = document.createElement('div');
    zone.className = 'cardzone';
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'flashcard-' + qi;

    // top row
    var top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML =
      '<span class="qnum">Question <b>' + (state.current+1) + '</b> of ' + state.order.length + '</span>';
    var tagrow = document.createElement('div');
    tagrow.className = 'tagrow';
    if(multi){
      var tag = document.createElement('span');
      tag.className = 'tag multi';
      tag.textContent = 'Select ' + corrSet.length;
      tagrow.appendChild(tag);
    }
    var bm = document.createElement('button');
    bm.className = 'bookmark-btn' + (state.bookmarks[qi] ? ' on' : '');
    bm.innerHTML = '<i class="ti ' + (state.bookmarks[qi] ? 'ti-bookmark-filled' : 'ti-bookmark') + '"></i>';
    bm.setAttribute('aria-label','Bookmark this question');
    bm.onclick = function(){
      state.bookmarks[qi] = !state.bookmarks[qi];
      saveState();
      render();
    };
    tagrow.appendChild(bm);
    top.appendChild(tagrow);
    card.appendChild(top);

    var qtext = document.createElement('p');
    qtext.className = 'question';
    qtext.textContent = q.question;
    card.appendChild(qtext);

    var optsWrap = document.createElement('div');
    optsWrap.className = 'options';
    card.appendChild(optsWrap);

    var attemptNote = document.createElement('p');
    attemptNote.className = 'attempt-note';
    card.appendChild(attemptNote);

    var localState = saved ? Object.assign({}, saved) : {
      attempts: 0,
      locked: false,
      finalCorrect: false,
      selectedMulti: [],
      revealed: false
    };

    function persistAndStats(){
      state.answers[qi] = localState;
      saveState();
      renderStats();
    }

    function showExplanation(){
      var old = card.querySelector('#explainBox');
      if(old) old.remove();
      var box = buildExplanation(q, []);
      card.appendChild(box);
      requestAnimationFrame(function(){
        box.classList.add('open');
      });
      var ctl = card.querySelector('.controlsrow');
      if(ctl) ctl.remove();
    }

    function lockSingle(key, opts){
      var isCorrect = corrSet.indexOf(key) !== -1;
      localState.attempts = (localState.attempts||0) + 1;
      opts.forEach(function(o){
        o.classList.add('locked');
        var k = o.getAttribute('data-key');
        if(k === key){
          o.classList.add(isCorrect ? 'correct' : 'incorrect');
        }
      });
      if(isCorrect){
        localState.locked = true;
        localState.finalCorrect = true;
        localState.chosenKey = key;
        persistAndStats();
        showExplanation();
      } else {
        var wrongOpt = null;
        opts.forEach(function(o){ if(o.getAttribute('data-key')===key) wrongOpt = o; });
        if(wrongOpt){
          wrongOpt.classList.add('shake');
          setTimeout(function(){ wrongOpt.classList.remove('shake'); }, 420);
        }
        if(localState.attempts >= 2){
          localState.locked = true;
          localState.finalCorrect = false;
          localState.chosenKey = key;
          opts.forEach(function(o){
            var k = o.getAttribute('data-key');
            if(corrSet.indexOf(k) !== -1){ o.classList.add('correct'); }
          });
          attemptNote.textContent = 'Correct answer revealed above.';
          attemptNote.classList.add('show');
          persistAndStats();
          showExplanation();
        } else {
          opts.forEach(function(o){
            var k = o.getAttribute('data-key');
            if(k === key){
              o.classList.remove('locked');
              o.classList.add('faded');
            }
          });
          attemptNote.textContent = 'Not quite — option ' + key + ' is incorrect. Give it one more try.';
          attemptNote.classList.add('show');
          persistAndStats();
        }
      }
    }

    if(!multi){
      var optEls = [];
      optionKeys(q).forEach(function(k){
        var btn = document.createElement('button');
        btn.className = 'opt';
        btn.setAttribute('data-key', k);
        btn.innerHTML =
          '<span class="letter">' + k + '</span>' +
          '<span class="otext"></span>' +
          '<span class="markicon"><i class="ti"></i></span>';
        btn.querySelector('.otext').textContent = q.options[k];
        optEls.push(btn);
        optsWrap.appendChild(btn);

        if(localState.locked){
          btn.classList.add('locked');
          if(k === localState.chosenKey && !localState.finalCorrect){
            btn.classList.add('incorrect');
          }
          if(corrSet.indexOf(k) !== -1){
            btn.classList.add('correct');
          }
        } else if(localState.attempts >= 1 && k === localState.chosenKey){
          btn.classList.add('faded');
        }

        btn.onclick = function(){
          if(localState.locked) return;
          lockSingle(k, optEls);
        };
      });
      if(localState.locked){
        attemptNote.textContent = localState.finalCorrect ? '' :
          (localState.attempts >= 2 ? 'Correct answer revealed above.' : '');
        if(attemptNote.textContent) attemptNote.classList.add('show');
      }
    } else {
      var selected = localState.selectedMulti || [];
      var optEls2 = [];
      optionKeys(q).forEach(function(k){
        var btn = document.createElement('button');
        btn.className = 'opt';
        btn.setAttribute('data-key', k);
        btn.innerHTML =
          '<span class="letter">' + k + '</span>' +
          '<span class="otext"></span>' +
          '<span class="markicon"><i class="ti"></i></span>';
        btn.querySelector('.otext').textContent = q.options[k];
        optEls2.push(btn);
        optsWrap.appendChild(btn);

        if(localState.locked){
          btn.classList.add('locked');
          var wasSelected = selected.indexOf(k) !== -1;
          var isC = corrSet.indexOf(k) !== -1;
          if(isC){ btn.classList.add('correct'); }
          else if(wasSelected){ btn.classList.add('incorrect'); }
        } else {
          if(selected.indexOf(k) !== -1) btn.classList.add('selectedMulti');
          btn.onclick = function(){
            var i = selected.indexOf(k);
            if(i === -1) selected.push(k); else selected.splice(i,1);
            localState.selectedMulti = selected;
            persistAndStats();
            render();
          };
        }
      });

      var controls = document.createElement('div');
      controls.className = 'controlsrow';
      if(!localState.locked){
        var checkBtn = document.createElement('button');
        checkBtn.className = 'btn primary';
        checkBtn.textContent = 'Check answer';
        checkBtn.disabled = selected.length === 0;
        checkBtn.onclick = function(){
          var setA = selected.slice().sort().join(',');
          var setB = corrSet.slice().sort().join(',');
          var ok = setA === setB;
          localState.locked = true;
          localState.finalCorrect = ok;
          persistAndStats();
          render();
        };
        controls.appendChild(checkBtn);
      }
      card.appendChild(controls);
    }

    if(localState.locked){
      var box2 = buildExplanation(q, []);
      box2.classList.add('open');
      card.appendChild(box2);
    }

    zone.appendChild(card);
    mainArea.appendChild(zone);

    // nav
    var nav = document.createElement('div');
    nav.className = 'navrow';
    var prevBtn = document.createElement('button');
    prevBtn.className = 'navbtn';
    prevBtn.innerHTML = '<i class="ti ti-arrow-left"></i><span class="label">Previous</span>';
    prevBtn.disabled = state.current === 0;
    prevBtn.onclick = function(){ goTo(state.current - 1); };

    var mid = document.createElement('div');
    mid.className = 'navmid';
    var answeredCount = Object.keys(state.answers).length;
    mid.textContent = answeredCount + ' / ' + state.order.length + ' answered';

    var nextBtn = document.createElement('button');
    nextBtn.className = 'navbtn';
    nextBtn.innerHTML = '<span class="label">Next</span><i class="ti ti-arrow-right"></i>';
    nextBtn.disabled = state.current >= state.order.length - 1;
    nextBtn.onclick = function(){ goTo(state.current + 1); };

    nav.appendChild(prevBtn);
    nav.appendChild(mid);
    nav.appendChild(nextBtn);
    mainArea.appendChild(nav);

    persistAndStats();
  }

  function renderReview(){
    renderStats();
    mainArea.innerHTML = '';
    var header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;';
    header.innerHTML = '<p style="font-family:var(--serif);font-size:18px;font-weight:500;margin:0;">Review · missed questions</p>';
    var backBtn = document.createElement('button');
    backBtn.className = 'btn';
    backBtn.textContent = 'Back to deck';
    backBtn.onclick = function(){ state.reviewMode = false; render(); };
    header.appendChild(backBtn);
    mainArea.appendChild(header);

    var missedIdx = [];
    state.order.forEach(function(qi, idx){
      var a = state.answers[qi];
      if(a && !a.finalCorrect) missedIdx.push(idx);
    });

    if(missedIdx.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<i class="ti ti-circle-check"></i>No missed questions yet — keep going, or come back here after a full pass.';
      mainArea.appendChild(empty);
      return;
    }

    var list = document.createElement('div');
    list.className = 'review-list';
    missedIdx.forEach(function(idx){
      var qi = state.order[idx];
      var q = ORIGINAL_QUESTIONS[qi];
      var item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML =
        '<span class="ri-badge">Q' + (idx+1) + '</span>' +
        '<span class="ri-text"><span class="rq">Tap to revisit</span>' + q.question.slice(0,140) + (q.question.length>140?'…':'') + '</span>';
      item.onclick = function(){
        state.reviewMode = false;
        goTo(idx);
      };
      list.appendChild(item);
    });
    mainArea.appendChild(list);
  }

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  document.getElementById('shuffleBtn').onclick = function(){
    state.order = shuffle(ORIGINAL_QUESTIONS.map(function(q,i){return i;}));
    state.current = 0;
    state.reviewMode = false;
    saveState();
    render();
  };
  document.getElementById('reviewBtn').onclick = function(){
    state.reviewMode = !state.reviewMode;
    document.getElementById('reviewBtn').classList.toggle('active', state.reviewMode);
    render();
  };
  document.getElementById('darkBtn').onclick = function(){
    state.dark = !state.dark;
    document.documentElement.classList.toggle('dark', state.dark);
    document.getElementById('darkBtn').classList.toggle('active', state.dark);
    saveState();
  };
  if(state.dark) document.getElementById('darkBtn').classList.add('active');

  render();
})();
</script>
</body>
